name: Daily FastMoss POP MART

on:
  schedule:
    - cron: "20 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional report date, YYYY-MM-DD"
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FASTMOSS_CLIENT_SECRET: ${{ secrets.FASTMOSS_CLIENT_SECRET }}
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch FastMoss data
        run: |
          cd fastmoss-popmart
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python3 scripts/update_popmart_daily.py --date "${{ github.event.inputs.date }}" --render
          else
            python3 scripts/update_popmart_daily.py --render
          fi
          cp docs/index.html index.html

      - name: Commit source updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fastmoss-popmart/data fastmoss-popmart/docs fastmoss-popmart/index.html
          if git diff --cached --quiet; then
            echo "No source data changes."
          else
            git commit -m "Update FastMoss POP MART daily data"
            git push
          fi

      - name: Publish Pages branch
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          mkdir -p /tmp/gh-pages/fastmoss-popmart/data
          cp fastmoss-popmart/index.html /tmp/gh-pages/fastmoss-popmart/index.html
          cp fastmoss-popmart/data/daily_summary.csv /tmp/gh-pages/fastmoss-popmart/data/daily_summary.csv
          cp fastmoss-popmart/data/live_rooms.csv /tmp/gh-pages/fastmoss-popmart/data/live_rooms.csv
          cp fastmoss-popmart/data/top_skus.csv /tmp/gh-pages/fastmoss-popmart/data/top_skus.csv
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fastmoss-popmart
          if git diff --cached --quiet; then
            echo "No Pages changes."
          else
            git commit -m "Publish FastMoss POP MART dashboard"
            git push origin gh-pages
          fi
